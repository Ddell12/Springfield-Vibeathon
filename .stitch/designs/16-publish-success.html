<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-dim": "#dadada",
              "primary": "#004042",
              "on-tertiary-fixed-variant": "#594135",
              "tertiary-container": "#634a3d",
              "on-error-container": "#93000a",
              "on-surface": "#1a1c1c",
              "surface-bright": "#f9f9f9",
              "on-secondary": "#ffffff",
              "secondary-fixed-dim": "#c0c1ff",
              "on-secondary-fixed-variant": "#3539a1",
              "on-secondary-fixed": "#04006d",
              "surface-variant": "#e2e2e2",
              "on-primary-fixed": "#002021",
              "tertiary-fixed": "#ffdbca",
              "on-background": "#1a1c1c",
              "inverse-on-surface": "#f0f1f1",
              "inverse-surface": "#2f3131",
              "on-tertiary-fixed": "#2a170d",
              "surface": "#f9f9f9",
              "primary-fixed-dim": "#8ed2d5",
              "on-primary-fixed-variant": "#004f52",
              "surface-container-high": "#e8e8e8",
              "on-primary-container": "#89cdd0",
              "on-secondary-container": "#22248f",
              "secondary-container": "#8f93ff",
              "surface-container-lowest": "#ffffff",
              "secondary-fixed": "#e1e0ff",
              "surface-container-highest": "#e2e2e2",
              "primary-container": "#00595c",
              "secondary": "#4e52ba",
              "tertiary": "#4a3428",
              "on-error": "#ffffff",
              "on-tertiary": "#ffffff",
              "surface-container-low": "#f3f3f4",
              "surface-container": "#eeeeee",
              "primary-fixed": "#aaeef1",
              "on-tertiary-container": "#ddbbab",
              "background": "#f9f9f9",
              "on-primary": "#ffffff",
              "outline": "#6f7979",
              "tertiary-fixed-dim": "#e2bfaf",
              "outline-variant": "#bec8c8",
              "inverse-primary": "#8ed2d5",
              "surface-tint": "#1d686b",
              "on-surface-variant": "#3f4949",
              "error": "#ba1a1a",
              "error-container": "#ffdad6"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-mesh {
            background-color: #f9f9f9;
            background-image: radial-gradient(at 0% 0%, #ffdbca 0px, transparent 50%),
                              radial-gradient(at 100% 0%, #e1e0ff 0px, transparent 50%);
        }
    </style>
</head>
<body class="font-body bg-background text-on-surface overflow-hidden">
<!-- BACKGROUND BUILDER CANVAS (Blurred) -->
<div class="fixed inset-0 z-0 blur-[20px] scale-105 opacity-40 select-none pointer-events-none">
<!-- Top Nav Placeholder -->
<header class="bg-[#004042] text-[#ffdbca] px-8 py-4 flex justify-between items-center">
<span class="text-2xl font-bold tracking-tighter">ToolBuilder</span>
<div class="flex gap-6 font-headline font-bold">
<span>My Tools</span>
<span>Templates</span>
<span>Analytics</span>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container-highest"></div>
</header>
<main class="p-12 max-w-6xl mx-auto space-y-8">
<div class="flex justify-between items-end">
<div>
<h1 class="font-headline text-5xl font-extrabold text-primary tracking-tight">Morning Routine Board</h1>
<p class="text-primary/60 mt-2">Visual scheduler for peak productivity</p>
</div>
<div class="flex gap-4">
<div class="w-32 h-12 bg-surface-container-highest rounded-lg"></div>
<div class="w-32 h-12 bg-primary-container rounded-lg"></div>
</div>
</div>
<!-- Bento Grid Content Mockup -->
<div class="grid grid-cols-12 gap-6 h-[600px]">
<div class="col-span-8 bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant/20 p-8">
<div class="h-4 w-48 bg-surface-container rounded-full mb-8"></div>
<div class="space-y-4">
<div class="h-24 bg-surface-container-low rounded-xl w-full"></div>
<div class="h-24 bg-surface-container-low rounded-xl w-full"></div>
<div class="h-24 bg-surface-container-low rounded-xl w-full"></div>
</div>
</div>
<div class="col-span-4 space-y-6">
<div class="h-1/2 bg-tertiary-fixed rounded-xl p-6"></div>
<div class="h-1/2 bg-secondary-fixed rounded-xl p-6"></div>
</div>
</div>
</main>
</div>
<!-- OVERLAY SCRIM -->
<div class="fixed inset-0 z-10 bg-on-surface/20 backdrop-blur-sm"></div>
<!-- SUCCESS MODAL -->
<div class="fixed inset-0 z-20 flex items-center justify-center p-4">
<div class="w-full max-w-[440px] bg-surface-container-lowest rounded-xl p-8 relative overflow-hidden flex flex-col items-center">
<!-- Celebration Area -->
<div class="relative mb-8">
<!-- Decorative Confetti Elements -->
<div class="absolute -top-4 -left-6 w-3 h-3 rounded-full bg-primary-container"></div>
<div class="absolute -top-8 right-2 w-4 h-4 rounded-full bg-tertiary-fixed"></div>
<div class="absolute bottom-2 -right-10 w-3 h-3 rounded-full bg-secondary"></div>
<div class="absolute -bottom-6 -left-2 w-2 h-2 rounded-full bg-primary"></div>
<div class="absolute top-1/2 -right-8 w-2 h-2 rounded-full bg-tertiary-container"></div>
<!-- Main Checkmark Circle -->
<div class="w-24 h-24 rounded-full bg-primary-container flex items-center justify-center relative z-10">
<span class="material-symbols-outlined text-white text-5xl" style="font-variation-settings: 'wght' 600;">check</span>
</div>
<!-- Secondary Decorative Rings (Joyful Architect Style) -->
<div class="absolute inset-0 scale-150 rounded-full border border-secondary/10 -z-0"></div>
<div class="absolute inset-0 scale-[1.8] rounded-full border border-tertiary-fixed/30 -z-0"></div>
</div>
<!-- Heading & Subtext -->
<div class="text-center space-y-3 mb-10">
<h2 class="font-headline text-3xl font-bold text-primary tracking-tight leading-none">Your tool is live!</h2>
<p class="text-on-surface-variant text-base font-body leading-relaxed max-w-[320px] mx-auto">
                    Morning Routine Board is now published and ready to share.
                </p>
</div>
<!-- URL Input Area -->
<div class="w-full mb-10">
<div class="flex items-center gap-2 bg-surface-container-low p-2 rounded-lg group transition-all hover:bg-surface-container">
<div class="flex-1 px-3 py-2 overflow-hidden text-ellipsis whitespace-nowrap text-on-surface-variant font-medium text-sm">
                        bridges.app/tool/morning-routine
                    </div>
<button class="flex items-center justify-center w-10 h-10 bg-surface-container-lowest text-primary rounded-md shadow-sm border border-outline-variant/10 hover:scale-105 active:scale-95 transition-all">
<span class="material-symbols-outlined text-xl">content_copy</span>
</button>
</div>
</div>
<!-- Share Options Row -->
<div class="w-full grid grid-cols-3 gap-4 mb-10">
<button class="flex flex-col items-center gap-3 py-2 group">
<div class="w-12 h-12 rounded-full bg-surface-container-low flex items-center justify-center text-primary group-hover:bg-tertiary-fixed group-hover:text-on-tertiary-fixed transition-colors">
<span class="material-symbols-outlined">link</span>
</div>
<span class="text-[11px] font-bold uppercase tracking-widest text-on-surface-variant/70">Copy Link</span>
</button>
<button class="flex flex-col items-center gap-3 py-2 group">
<div class="w-12 h-12 rounded-full bg-surface-container-low flex items-center justify-center text-primary group-hover:bg-tertiary-fixed group-hover:text-on-tertiary-fixed transition-colors">
<span class="material-symbols-outlined">qr_code_2</span>
</div>
<span class="text-[11px] font-bold uppercase tracking-widest text-on-surface-variant/70">QR Code</span>
</button>
<button class="flex flex-col items-center gap-3 py-2 group">
<div class="w-12 h-12 rounded-full bg-surface-container-low flex items-center justify-center text-primary group-hover:bg-tertiary-fixed group-hover:text-on-tertiary-fixed transition-colors">
<span class="material-symbols-outlined">ios_share</span>
</div>
<span class="text-[11px] font-bold uppercase tracking-widest text-on-surface-variant/70">Share</span>
</button>
</div>
<!-- CTAs -->
<div class="w-full space-y-4">
<button class="w-full py-4 bg-gradient-to-r from-primary to-primary-container text-white font-bold rounded-lg hover:brightness-110 active:scale-[0.98] transition-all">
                    Back to Builder
                </button>
<button class="w-full py-2 text-primary font-semibold text-sm hover:underline flex justify-center items-center gap-2">
                    View published tool
                    <span class="material-symbols-outlined text-sm">open_in_new</span>
</button>
</div>
</div>
</div>
<!-- BOTTOM NAV (Mandatory Shared Component - Hidden for Modal Focus) -->
<!-- Suppressed due to Transactional Focus as per the "Semantic Shell" mandate -->
</body></html>
